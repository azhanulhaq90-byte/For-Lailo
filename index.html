<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Laila 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Nunito', sans-serif;
    text-align: center;
    margin: 0;
    overflow-x: hidden;
    overflow-y: auto;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
}

/* Hearts */
.hearts span {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1;}
    100% { transform: translateY(-110vh); opacity: 0;}
}

/* Main */
.container {
    margin-top: 80px;
}

h1 {
    font-size: 32px;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 10px rgba(255,0,100,0.6);
}

img {
    width: 200px;
    margin: 20px 0;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-10px);}
}

/* Buttons */
.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    padding: 14px 28px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

#yes-btn {
    background: #00c853;
    color: white;
}

#no-btn {
    background: #ff1744;
    color: white;
    min-width: 120px;
}

/* Final message */
.final-text {
    font-size: 20px;
    font-weight: 700;
    color: white;
    max-width: 700px;
    margin: auto;
    line-height: 1.6;
    white-space: pre-line;
}

/* Music button */
#music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: white;
    border-radius: 50%;
    padding: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">
    <h1 id="typing-text"></h1>
    <img src="https://media.tenor.com/6zVZ8g6fXhQAAAAi/sad-bear.gif">
    <div class="buttons">
        <button id="yes-btn">Yes 💕</button>
        <button id="no-btn">No 😔</button>
    </div>
</div>

<audio id="music" loop autoplay>
    <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<div id="music-btn">🔊</div>

<script>

/* Floating hearts */
setInterval(() => {
    const heart = document.createElement("span");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*3) + "s";
    document.getElementById("hearts").appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);

/* Typing question */
const text = "Will you be mine again, Laila? 💖";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing-text").innerHTML += text[i];
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

/* Buttons logic */
let noClickCount = 0;
const noBtn = document.getElementById("no-btn");
const yesBtn = document.getElementById("yes-btn");

noBtn.addEventListener("click", () => {
    noClickCount++;
    yesBtn.style.transform = `scale(${1 + noClickCount*0.25})`;

    if(noClickCount===1) noBtn.innerText="Man jao naa?? 😣";
    else if(noClickCount===2) noBtn.innerText="Please lailooo?? 🥺";
    else if(noClickCount===3) noBtn.innerText="Phir sy no bola tu sad hojaunga 💔";
    else if(noClickCount===4) noBtn.innerText="Last time bolrha hun… 😞";
    else {
        noBtn.innerText="Pakro mujhe 😏";
        noBtn.style.position="absolute";
        noBtn.style.top=Math.random()*80+"%";
        noBtn.style.left=Math.random()*80+"%";
    }
});

/* YES CLICK - FINAL PAGE */
yesBtn.addEventListener("click", () => {

document.body.innerHTML = `
<div style="height:100vh; display:flex; flex-direction:column; background: linear-gradient(135deg, #ff9a9e, #fecfef);">

    <!-- FIXED HEADER -->
    <div style="text-align:center; padding:20px;">
        <h1 style="font-size:34px; color:white; text-shadow:0 0 15px #ff00aa;">
            Thank you, ILYSM ❤️
        </h1>
        <img src="https://media.tenor.com/9rQzZ3zH5XgAAAAi/happy-bear.gif" width="200">
    </div>

    <!-- SCROLL AREA -->
    <div id="scroll-box" style="flex:1; overflow-y:auto; padding:20px;">
        <div id="final-msg" class="final-text"></div>
    </div>

</div>
`;

const msg = `Let’s start again in a better way.

Jo bhi hua, jaise bhi hua, but my love for you is constant.

Hum ne 2 saal ek saath boht achay se spend kiye—kuch ghaltiyan thin, but I promise I’ll become a better person for you.

It’s already been too much, meri jaan. Please, ab bas kar do.

Jo kehna hai, jitna ghussa nikalna hai, mere paas aa ke nikal dena.

I can do anything, but losing you is something I cannot afford.

Waiting for you, my love ❤️`;

let j = 0;
const finalMsg = document.getElementById("final-msg");
const scrollBox = document.getElementById("scroll-box");

function typeFinal() {
    if (j < msg.length) {
        finalMsg.innerHTML += msg[j];
        j++;

        scrollBox.scrollTop = scrollBox.scrollHeight;

        setTimeout(typeFinal, 35);
    }
}

typeFinal();

});

/* Music toggle */
const music = document.getElementById("music");
const btn = document.getElementById("music-btn");

btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.innerText = "🔊";
    } else {
        music.pause();
        btn.innerText = "🔇";
    }
});

</script>

</body>
</html>
