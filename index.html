<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Laila 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Nunito', sans-serif;
        text-align: center;
        margin: 0;
        overflow-x: hidden; /* Allow vertical scroll for long messages */
        background: linear-gradient(135deg, #ff9a9e, #fecfef);
        min-height: 100vh;
    }

    .hearts span {
        position: fixed;
        bottom: -10px;
        font-size: 20px;
        animation: float 6s linear infinite;
        z-index: -1;
    }

    @keyframes float {
        0% { transform: translateY(0); opacity: 1;}
        100% { transform: translateY(-110vh); opacity: 0;}
    }

    .container {
        padding: 40px 20px;
        animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h1 {
        font-size: 32px;
        font-weight: 900;
        color: white;
        text-shadow: 0 0 10px rgba(255,0,100,0.6);
    }

    img {
        width: 180px;
        margin: 20px 0;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%,100% { transform: translateY(0);}
        50% { transform: translateY(-10px);}
    }

    .buttons {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    button {
        padding: 14px 28px;
        font-size: 16px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
    }

    #yes-btn {
        background: #00c853;
        color: white;
        box-shadow: 0 0 15px #00c853;
    }

    #no-btn {
        background: #ff1744;
        color: white;
        min-width: 120px;
    }

    #music-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        border-radius: 50%;
        padding: 10px;
        cursor: pointer;
        z-index: 100;
    }

    .final-text {
        font-size: 18px;
        font-weight: 700;
        color: white;
        text-shadow: 0 0 5px rgba(0,0,0,0.3);
        margin: 20px auto;
        max-width: 600px;
        line-height: 1.6;
        white-space: pre-wrap; /* This preserves your line breaks */
    }
</style>
</head>

<body>
<div class="hearts" id="hearts"></div>

<div class="container" id="main-content">
    <h1 id="typing-text"></h1>
    <img id="gif" src="https://media.tenor.com/6zVZ8g6fXhQAAAAi/sad-bear.gif">
    <div class="buttons">
        <button id="yes-btn">Yes 💕</button>
        <button id="no-btn">No 😔</button>
    </div>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<div id="music-btn">🔊</div>

<script>
// Floating hearts
setInterval(() => {
    const heart = document.createElement("span");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*3) + "s";
    document.getElementById("hearts").appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);

// Typing effect
const text = "Will you be mine again, Laila? 💖";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing-text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

const noBtn = document.getElementById("no-btn");
const yesBtn = document.getElementById("yes-btn");
let noClickCount = 0;

noBtn.addEventListener("click", () => {
    noClickCount++;
    let scale = 1 + noClickCount*0.3;
    yesBtn.style.transform = `scale(${scale})`;
    
    if(noClickCount===1) noBtn.innerText="Man jao naa?? 😣";
    else if(noClickCount===2) noBtn.innerText="Please lailooo?? 🥺";
    else if(noClickCount===3) noBtn.innerText="Phir sy no bola tu... 💔";
    else if(noClickCount===4) noBtn.innerText="Last time bol rha hun… 😞";
    else {
        noBtn.innerText="Ab bolo zara NO 😏";
        noBtn.style.position="absolute";
        noBtn.style.top=Math.random()*80+"%";
        noBtn.style.left=Math.random()*80+"%";
    }
});

yesBtn.addEventListener("click", () => {
    // Replaced standard quotes with backticks for multi-line string support
    const msg = `Let’s start again in a better way. Jo bhi hua, jaise bhi hua, but my love for you is constant. Hum ne 2 saal ek saath boht achay se spend kiye—kuch ghaltiyan thin, but I promise I’ll become a better person for you and give you only happy moments from now on.

It’s already been too much, meri jaan. Please, ab bas kar do. No one is saying sab bhool jao—beshak jo kuch kehna hai, jitna ghussa nikalna hai, mere paas aa ke nikal dena. I can do anything, but losing you is something I cannot afford.

Waiting for you, my love! :)`;

    document.getElementById("main-content").innerHTML = `
        <h1 style="font-size:36px;">Thank you, ILYSM ❤️</h1>
        <img src="https://media.tenor.com/9rQzZ3zH5XgAAAAi/happy-bear.gif">
        <div class="final-text" id="final-msg"></div>
    `;

    let j = 0;
    const finalMsgElement = document.getElementById("final-msg");
    
    function typeFinal() {
        if (j < msg.length) {
            // Using textContent and replacing \n with <br> for safety
            if (msg[j] === '\n') {
                finalMsgElement.innerHTML += '<br>';
            } else {
                finalMsgElement.innerHTML += msg[j];
            }
            j++;
            setTimeout(typeFinal, 35); // Slightly faster for long text
        }
    }
    typeFinal();

    // Confetti
    for(let k=0; k<100; k++){
        const c = document.createElement("div");
        c.style.position="fixed";
        c.style.width="8px";
        c.style.height="8px";
        c.style.background=["#ff69b4","#ff1493","#ffb6c1","#fff0f5"][Math.floor(Math.random()*4)];
        c.style.top="-10px";
        c.style.left=Math.random()*100+"%";
        c.style.borderRadius="50%";
        c.style.animation="confettiFall "+(3+Math.random()*2)+"s linear infinite";
        document.body.appendChild(c);
    }
});

// Music toggle
const music = document.getElementById("music");
const mBtn = document.getElementById("music-btn");
mBtn.addEventListener("click", () => {
    if(music.paused) { music.play(); mBtn.innerText="🔊"; }
    else { music.pause(); mBtn.innerText="🔇"; }
});
</script>

<style>
@keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);}
    100%{transform:translateY(110vh) rotate(720deg);}
}
</style>
</body>
</html>
