<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Laila 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Playfair+Display:wght@500;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Nunito', sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background: linear-gradient(135deg, #ffe4e9, #f8c1d9, #f8a8c2);
        min-height: 100vh;
        color: white;
    }

    /* Dark Pink Neon Glow */
    h1, .final-heading {
        text-shadow: 0 0 15px #ff1493,
                     0 0 30px #ff1493,
                     0 0 45px #c71585;
    }

    /* Floating Hearts - Main Page */
    .hearts span {
        position: fixed;
        bottom: -50px;
        font-size: 28px;
        z-index: 1;
        animation: float linear infinite;
        opacity: 0.9;
    }
    @keyframes float {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(-110vh) rotate(25deg); }
    }

    .container {
        margin-top: 120px;
        position: relative;
        z-index: 2;
    }

    h1 {
        font-size: 38px;
        font-weight: 900;
        color: white;
        margin-bottom: 40px;
        line-height: 1.3;
    }

    /* Buttons */
    button {
        padding: 16px 36px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.4s ease;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    #yes-btn {
        background: linear-gradient(45deg, #ff4d94, #ff80ab);
        color: white;
    }
    #yes-btn:hover {
        transform: scale(1.08);
    }
    #no-btn {
        background: #ff1744;
        color: white;
        padding: 13px 28px;
        font-size: 16.5px;
        transition: all 0.35s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    /* Final Page - Enhanced Background Animations */
    .final-page {
        min-height: 100vh;
        background: linear-gradient(135deg, #ffe4f0, #ffc2d9, #ff9eb8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px 15px;
        position: relative;
        overflow: hidden;
    }

    /* Background Floating Elements */
    .bg-heart {
        position: absolute;
        font-size: 35px;
        opacity: 0.12;
        animation: bgFloat 25s linear infinite;
        z-index: 1;
        pointer-events: none;
    }
    @keyframes bgFloat {
        0% { transform: translateY(100vh) rotate(0deg); }
        100% { transform: translateY(-100vh) rotate(360deg); }
    }

    .final-content {
        max-width: 680px;
        width: 100%;
        z-index: 3;
    }

    .final-text {
        font-family: 'Playfair Display', serif;
        font-size: 21px;
        line-height: 1.9;
        color: #4a0f2e;
        background: rgba(255,255,255,0.28);
        padding: 38px 32px;
        border-radius: 28px;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        text-align: left;
        white-space: pre-line;
        max-height: 58vh;
        overflow-y: auto;
        border: 1px solid rgba(255,255,255,0.3);
        z-index: 2;
    }

    .signature {
        position: fixed;
        bottom: 35px;
        right: 35px;
        font-family: 'Dancing Script', cursive;
        font-size: 37px;
        color: white;
        text-shadow: 0 0 25px #fff, 0 0 40px #ff1493;
        line-height: 1.1;
        text-align: right;
        z-index: 10;
        pointer-events: none;
    }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container">
    <h1 id="typing-text"></h1>
    <div class="buttons">
        <button id="yes-btn">Yes, I will 💕</button>
        <button id="no-btn">No 😔</button>
    </div>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<div id="music-btn">🎵</div>

<script>
// Floating Hearts - Main Page
setInterval(() => {
    const heart = document.createElement("span");
    heart.innerHTML = Math.random() > 0.5 ? "💖" : "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.getElementById("hearts").appendChild(heart);
    setTimeout(() => heart.remove(), 9000);
}, 280);

// Typing Effect
const text = "Will you be mine again, Laila? 💖";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing-text").innerHTML += text[i];
        i++;
        setTimeout(typeEffect, 55);
    }
}
typeEffect();

// No Button Logic
let noClickCount = 0;
const noBtn = document.getElementById("no-btn");
const yesBtn = document.getElementById("yes-btn");

noBtn.addEventListener("click", () => {
    noClickCount++;
    yesBtn.style.transform = `scale(${1 + noClickCount * 0.22})`;
    
    if(noClickCount === 1) noBtn.innerText = "Man jao naa?? 😣";
    else if(noClickCount === 2) noBtn.innerText = "Please lailooo?? 🥺";
    else if(noClickCount === 3) noBtn.innerText = "Phir sy no bola tu sad hojaunga 💔";
    else if(noClickCount === 4) noBtn.innerText = "Last time bolrha hun… 😞";
    else {
        const randomX = Math.random() > 0.5 ? (8 + Math.random() * 35) : (57 + Math.random() * 35);
        const randomY = 18 + Math.random() * 58;
        
        noBtn.style.position = "absolute";
        noBtn.style.left = randomX + "%";
        noBtn.style.top = randomY + "%";
        noBtn.style.transform = `rotate(${Math.random() > 0.5 ? '-' : ''}${10 + Math.random()*15}deg)`;
        noBtn.innerText = "ab kar k dikhao mana 😏";
    }
});

// YES Button - Final Page with Beautiful Background Animation
yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
    <div class="final-page" id="finalPage">
        <!-- Background Animated Hearts -->
        <div id="bg-animations"></div>
        
        <div class="final-content">
            <h1 class="final-heading" style="font-size:42px; margin-bottom:30px;">
                Thank you, my love ❤️
            </h1>
            <div class="final-text" id="final-msg"></div>
        </div>
        
        <div class="signature">
            made with love,<br>
            Your Stupid Azhanuu ❤️
        </div>
    </div>`;

    // Background slow floating hearts
    const bgContainer = document.getElementById("bg-animations");
    function createBgHeart() {
        const heart = document.createElement("div");
        heart.className = "bg-heart";
        heart.innerHTML = Math.random() > 0.6 ? "💖" : "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (18 + Math.random() * 22) + "s";
        heart.style.animationDelay = "-" + Math.random() * 25 + "s";
        heart.style.opacity = 0.08 + Math.random() * 0.08;
        bgContainer.appendChild(heart);
        
        setTimeout(() => heart.remove(), 50000);
    }

    // Create many background hearts
    for(let i = 0; i < 18; i++) {
        createBgHeart();
    }
    setInterval(createBgHeart, 1800);

    // Joy particles (foreground)
    let particlesStopped = false;
    const particles = ["💕", "✨", "❤️"];
    const particleInterval = setInterval(() => {
        if (particlesStopped) return;
        const p = document.createElement("div");
        p.style.position = "absolute";
        p.style.fontSize = "28px";
        p.style.left = Math.random() * 100 + "vw";
        p.style.bottom = "-50px";
        p.style.zIndex = "2";
        p.style.opacity = "0.7";
        p.innerHTML = particles[Math.floor(Math.random() * particles.length)];
        p.style.animation = `joyFloat ${8 + Math.random()*7}s linear forwards`;
        document.getElementById("finalPage").appendChild(p);
        setTimeout(() => p.remove(), 20000);
    }, 600);

    // Music
    const music = document.createElement("audio");
    music.src = "https://www.bensound.com/bensound-music/bensound-love.mp3";
    music.loop = true;
    music.autoplay = true;
    document.body.appendChild(music);

    // Message
    const msg = `Mere Jaan let’s start again in a better way ❤️
Jo bhi hua, jaise bhi hua, everything changed but my love for you is constant hamesha say.
Hum ne 2 saal ek saath boht achay se spend kiye — kuch ghaltiyan thin, but I promise I’ll become a better person for you.
It’s already been too much, meri jaan… please, ab bas kar do.
Jo kehna hai, jitna ghussa nikalna hai, mere paas aa ke nikal dena.
I can do anything… but losing you is something I cannot afford.
Waiting for you, my love 💖`;

    let j = 0;
    const finalMsg = document.getElementById("final-msg");
    
    function typeFinal() {
        if (j < msg.length) {
            finalMsg.innerHTML += msg[j] === "\n" ? "<br><br>" : msg[j];
            j++;
            setTimeout(typeFinal, 38);
        } else {
            particlesStopped = true;
        }
    }
    setTimeout(typeFinal, 700);
});

// Music Toggle
document.getElementById("music-btn").addEventListener("click", function() {
    const audio = document.getElementById("music");
    if (audio.paused) {
        audio.play();
        this.innerText = "🎵";
    } else {
        audio.pause();
        this.innerText = "🔇";
    }
});
</script>

<style>
@keyframes float {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-110vh) rotate(25deg); }
}
@keyframes joyFloat {
    to { transform: translateY(-110vh) rotate(360deg); }
}
</style>
</body>
</html>
