<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Laila 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Nunito', sans-serif; text-align: center; margin: 0; overflow: hidden; background: linear-gradient(135deg, #ff9a9e, #fecfef); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .container { z-index: 10; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 80%; max-width: 400px; }
    h1 { color: #d63384; font-size: 24px; }
    .btns { margin-top: 20px; display: flex; justify-content: center; gap: 20px; position: relative; }
    button { padding: 12px 25px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
    #yes-btn { background: #ff4d6d; color: white; }
    #no-btn { background: #808080; color: white; position: absolute; left: 160px; }
    #final-msg { margin-top: 20px; font-size: 18px; color: #555; line-height: 1.5; font-weight: bold; }
    .hearts span { position: fixed; bottom: -10px; font-size: 20px; animation: float 6s linear infinite; }
    @keyframes float { 0% { transform: translateY(0); opacity: 1;} 100% { transform: translateY(-110vh); opacity: 0;} }
</style>
</head>
<body>

<div class="hearts" id="heart-container"></div>

<div class="container" id="main-card">
    <h1 id="question">Laila, will you forgive me? 💕</h1>
    <div class="btns" id="btn-group">
        <button id="yes-btn" onclick="celebrate()">Yes</button>
        <button id="no-btn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>
    <div id="final-msg"></div>
</div>

<script>
    // Floating Hearts
    setInterval(() => {
        const heart = document.createElement("span");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.getElementById("heart-container").appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }, 300);

    // No Button Moves
    function moveButton() {
        const btn = document.getElementById("no-btn");
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    // Yes Button Click
    function celebrate() {
        document.getElementById("question").innerHTML = "I Knew It! ❤️";
        document.getElementById("btn-group").style.display = "none";
        
        const msg = "Lailo, I know I have been a bit too much sometimes, but it's only because I can't imagine my life without you. 2 saal ki investment hai, isay aise zaya mat hone dena. I'm sorry for everything. Waiting for you, my love! :)";
        let j = 0;
        const finalMsg = document.getElementById("final-msg");
        
        function typeFinal() {
            if (j < msg.length) {
                finalMsg.innerHTML += msg[j];
                j++;
                setTimeout(typeFinal, 50);
            }
        }
        typeFinal();
    }
</script>

</body>
</html>
